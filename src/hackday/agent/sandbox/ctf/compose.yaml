# CTF compose with network enabled, otherwise identical to the
# inspect_evals/gdm_intercode_ctf compose. Many picoCTF challenges require
# downloading artifacts from picoctf.net; without network the model just
# bounces off wget failures and gives up.
#
# Build context points at the inspect_evals package directory so we reuse
# their Dockerfile + Dockerfile.template (regenerated by
# `generate_dockerfile()` at task instantiation time). The path is
# resolved at runtime from `inspect_evals.gdm_intercode_ctf.__file__` and
# exported as INSPECT_EVALS_CTF_DIR by `task_ctf.py:ctf_with_drugs`
# before inspect spins up the sandbox; that way this compose works on
# any host regardless of repo or venv layout.
services:
  default:
    build: ${INSPECT_EVALS_CTF_DIR}
    init: true
    command: tail -f /dev/null
    # No `network_mode: none` — bridge default allows outbound network so
    # the model can wget challenge artifacts from picoctf.net.
